# Spec: 000-bootstrap
#
# (The OAP spec IDs cited below, 209/219/121/168, are external OAP-corpus
#  specs governing the run-side verification leg; they are not resolvable in
#  this template's local `specs/` registry. The local owning spec is
#  000-bootstrap, which `establishes:` this workflow file.)
#
# The constitutional governance gate: compile the spec registry, lint the
# corpus at --fail-on-warn, verify the committed codebase index is fresh,
# and (on PRs) run the spec/code coupling gate against the PR base. Then,
# for a born-with produced app, re-check the factory's run-side paperwork
# with no trust in the producer: the born-with toolchain pin (OAP spec 209
# FR-004), claim provenance (OAP spec 121), and the governance certificate
# (OAP spec 168), via the vended `tenant-tail` npm pin (OAP spec 219).
#
# Dispatched unconditionally from `.github/workflows/ci.yml` (spec 013):
# governance is always-on, never path-filtered. The CLIs come from the
# `spec-spine` and `tenant-tail` npm devDependencies (prebuilt binaries;
# no extra toolchain).

name: spec-spine

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spec-spine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (root workspace)
        run: npm ci

      - name: Compile spec registry
        run: npx --no-install spec-spine compile

      - name: Corpus conformance lint (fail on warnings)
        run: npx --no-install spec-spine lint --fail-on-warn

      - name: Codebase index staleness gate
        run: npx --no-install spec-spine index check

      # PR-only: the coupling gate diffs against the PR base. The PR body
      # is passed for the `Spec-Drift-Waiver:` escape hatch (visible,
      # auditable). Exit 2 means a stale index — fixed by the gate above.
      - name: Spec/code coupling gate
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          printf '%s' "$PR_BODY" > /tmp/pr-body.txt
          npx --no-install spec-spine couple \
            --base "origin/${BASE_REF}" \
            --head HEAD \
            --pr-body /tmp/pr-body.txt

      # Tenant run-side verification (OAP spec 209: tenant kernel CI enforcement).
      # The verifiers are the vended `tenant-tail` npm pin (OAP spec 219); `npm ci`
      # above already gates their sha512 lockfile integrity (OAP spec 209 FR-004).
      # A born-with produced app carries the run-side paperwork these verbs
      # read; this template does not, so each step is conditional on
      # `.kernel-version` (the born-with marker) and emits a visible notice
      # when the subject is absent. Skip-as-pass is never used (OAP spec 209
      # FR-005): a gate that should run and cannot fails the build.

      - name: Born-with toolchain pin check (OAP spec 209 FR-004)
        run: |
          set -euo pipefail
          if [ ! -f .kernel-version ]; then
            echo "::notice::no .kernel-version (template or non-produced repo); born-with pin check activates in produced apps"
            exit 0
          fi
          installed="$(node -p "require('spec-spine/package.json').version")"
          # `|| true`: grep exits 1 when the field is absent (e.g. the non-npm
          # engine-fallback kernel emits spec_spine_version: None, omitted);
          # without it, set -e + pipefail would kill the step before the guard
          # below ever reports the cause. tr strips quotes and all whitespace
          # (incl. CRLF) so a Windows-authored stamp still compares equal.
          born="$(grep -E '^[[:space:]]*spec_spine_version:' .kernel-version | head -1 || true)"
          born="$(printf '%s' "${born#*:}" | tr -d "[:space:]\"'")"
          if [ -z "${born}" ]; then
            echo "::error::.kernel-version present but kernel.spec_spine_version is missing or empty"
            exit 1
          fi
          if [ "${installed}" != "${born}" ]; then
            echo "::error::spec-spine drift: installed ${installed} != born-with ${born} (.kernel-version). The governance toolchain drifted from birth; restore the born-with pin or re-baseline the kernel."
            exit 1
          fi
          echo "::notice::spec-spine pin matches born-with kernel (${born})"

      - name: Claim provenance verify (OAP spec 209 FR-001, OAP spec 121)
        run: |
          set -euo pipefail
          if [ ! -f .kernel-version ]; then
            echo "::notice::no .kernel-version; claim-provenance verification activates in produced apps"
            exit 0
          fi
          # --fail-on-rejected: a rejected claim fails the PR (FR-001). The
          # default exit 0 is diagnostic only and would not enforce.
          npx --no-install tenant-tail verify-provenance --project . --fail-on-rejected

      - name: Governance certificate verify (OAP spec 209 FR-001, OAP spec 168)
        run: |
          set -euo pipefail
          if [ ! -f .kernel-version ]; then
            echo "::notice::no .kernel-version; certificate verification activates in produced apps"
            exit 0
          fi
          # Shell glob (nullglob) instead of parsing `ls`: robust to paths with
          # spaces and free of lexicographic-vs-numeric ordering surprises. We
          # verify EVERY certificate present rather than guessing the latest, so
          # there is no ordering to get wrong; set -e fails the step on the first
          # invalid one.
          shopt -s nullglob
          certs=( .factory/runs/*/governance-certificate.json )
          [ -f governance-certificate.json ] && certs+=( governance-certificate.json )
          shopt -u nullglob
          if [ "${#certs[@]}" -eq 0 ]; then
            # The tenant-emit leg (OAP spec 209 FR-003) is deferred to the emit
            # spec, so a born-with app does not emit a certificate yet. A
            # designed conditional surfaced as a notice, not a masked gate:
            # once emission lands, this step verifies the cert.
            echo "::notice::no governance certificate found (tenant-emit leg deferred, OAP spec 209 FR-003); verify-certificate enforces once emission lands"
            exit 0
          fi
          for cert in "${certs[@]}"; do
            echo "verifying ${cert}"
            npx --no-install tenant-tail verify-certificate "${cert}" --artifact-dir "$(dirname "${cert}")"
          done
