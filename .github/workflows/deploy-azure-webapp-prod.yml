name: Deploy to Production

# Encore-as-zip deploy for the `production` environment (spec 012). Thin caller
# of the reusable workflow; secrets/vars resolve from the GitHub `production`
# environment.

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-azure-webapp-reusable.yml
    with:
      environment: production
    secrets: inherit
