    <title>Enterprise Application Template</title>

  <body>
    <!--
      Placeholder SPA shell. This file exists so the Encore `web` service has a
      directory to serve and the app boots in development.

      In development, run the Vue dev server (`npm run dev:web`) on :5173 — its
      Vite proxy forwards /api to the Encore API on :4000.

      For production, `npm run build:web` overwrites this directory with the real
      Vite build (apps/web/vite.config.ts sets build.outDir to apps/api/web/build).
    -->
    <main style="font-family: sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem">
      <h1>Enterprise Application Template</h1>
      <p>
        The SPA has not been built into this Encore app yet. In development, open the Vue
        dev server at <a href="http://localhost:5173">http://localhost:5173</a>. For
        production, run <code>npm run build:web</code> to populate this directory.
      </p>
    </main>
  </body>
</html>
