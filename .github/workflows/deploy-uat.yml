name: Deploy to UAT

# Container deploy for the `uat` environment. Thin caller of the reusable
# workflow; secrets/vars resolve from the GitHub `uat` environment.

on:
  workflow_dispatch:
  push:
    branches: [uat]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'docs/**'

permissions:
  contents: read
  actions: read
  packages: write
  id-token: write
  security-events: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: uat
    secrets: inherit
