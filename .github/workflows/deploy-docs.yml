name: Deploy docs to GitHub Pages
on:
  push:
    branches: [main]
    paths: ['website/**', '.github/workflows/deploy-docs.yml']
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  # Spec 016 FR-04: the workflow is inert until a repo admin enables Pages.
  # A freshly produced repo has Pages disabled, so `configure-pages` would
  # 404. This preflight queries the Pages API and skips the build/deploy jobs
  # ONLY on a genuine 404 (Pages not configured), so the run concludes green
  # rather than failing at `configure-pages`. Any other error (network, 5xx,
  # rate limit, auth) fails loudly instead of masquerading as "Pages off".
  # Enabling Pages stays a repo-admin action (FR-04, out of scope).
  preflight:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          response=$(gh api "repos/${{ github.repository }}/pages" 2>&1)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$response" | grep -q 'HTTP 404'; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=GitHub Pages not enabled::Skipping docs publish. A repo admin can enable Pages (Settings -> Pages -> Source: GitHub Actions) to activate this workflow (spec 016 FR-04)."
          else
            echo "::error title=Pages preflight failed::Unexpected response from the Pages API (not a 404): ${response}"
            exit 1
          fi
  build:
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: website/build
  deploy:
    needs: [preflight, build]
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
