name: Deploy to Staging

# Container deploy for the `staging` environment. Thin caller of the reusable
# workflow; secrets/vars resolve from the GitHub `staging` environment.

on:
  workflow_dispatch:
  push:
    branches: [staging]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'docs/**'

permissions:
  contents: read
  actions: read
  packages: write
  id-token: write
  security-events: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      environment: staging
    secrets: inherit
