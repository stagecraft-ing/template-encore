# Spec: 010-supply-chain-gates
# Spec: 011-workflow-pins-lint (jobs.workflow-pins)
# Spec: 009-repo-ci-orchestrator
#
# Supply-chain gates for the template:
#   - npm audit across both npm surfaces (root workspace + the standalone
#     Encore app at apps/api)
#   - workflow-ref SHA-pinning enforcement across .github/workflows/** and
#     .github/actions/**
#
# Posture: blocking from day 0. Severity bar: --audit-level=high. The
# weekly cron surfaces new advisories even on a quiet week.
#
# Dispatched unconditionally from `.github/workflows/ci.yml` (spec 009
# constitutional carve-out).

name: CI supply-chain

on:
  workflow_call:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    name: npm-audit / root workspace + apps/api
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: npm audit (root workspace)
        run: npm audit --audit-level=high

      - name: npm audit (apps/api)
        run: npm --prefix apps/api audit --audit-level=high

  # workflow-pins — spec 011's lint.
  # The lint script is shipped at tools/lint/workflow-pins.sh and runs in
  # both this CI job AND the opt-in pre-commit hook (.githooks/pre-commit).
  workflow-pins:
    runs-on: ubuntu-latest
    name: workflow-pins / SHA-pin enforcement
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run workflow-pins lint (tree-wide scan)
        run: tools/lint/workflow-pins.sh

      - name: Run workflow-pins regression tests (fixtures)
        run: tools/lint/workflow-pins-test.sh
