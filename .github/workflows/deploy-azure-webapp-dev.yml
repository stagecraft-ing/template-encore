name: Deploy to Dev

# Encore-as-zip deploy for the `dev` environment (spec 057). Thin caller of the
# reusable workflow; secrets/vars resolve from the GitHub `dev` environment.

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'docs/**'

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-azure-webapp-reusable.yml
    with:
      environment: dev
    secrets: inherit
