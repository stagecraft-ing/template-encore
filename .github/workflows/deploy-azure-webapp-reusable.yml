name: Reusable Azure Web App Deployment (Encore-as-zip)

# =================================================================
# REUSABLE WORKFLOW: AZURE APP SERVICE (NODE ZIP) DEPLOYMENT
# =================================================================
# Spec: 012-azure-webapp-deploy. The "today's continuity" half of the dual
# deploy strategy: package the compiled Encore app as a Node deployment zip and
# deploy it to Azure App Service for Linux, started with `node main.mjs`. The
# "tomorrow's alignment" half is the Encore container path
# (.github/workflows/encore-cd.yml.example, spec 011).
#
# The zip carries the SCRAPED Encore artifact (main.mjs + encore-runtime.node),
# the built public SPA (apps/api/web/build), and production node_modules. The
# artifact is produced by the OPTIONAL cancel-then-scrape build (the
# apps/api/scripts/docker-build.sh model), which reaches into Encore internals
# and is version-sensitive; the supported, robust deploy unit is the container
# image. See docs/DEPLOYMENT.md for the trade-offs.
#
# Caller workflows supply the environment name; secrets and variables are
# resolved from GitHub Environments (Settings > Environments).
# =================================================================

on:
  workflow_call:
    inputs:
      environment:
        description: 'GitHub environment name (e.g. production, uat, dev)'
        required: true
        type: string
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24.x'
      web-app:
        description: 'Which SPA to bundle and serve (web | web-internal)'
        required: false
        type: string
        default: 'web'
      runner:
        description: 'Self-hosted runner label for the deploy job (needs Azure network + identity). Override with your org runner label.'
        required: false
        type: string
        default: 'self-hosted'

    # Secrets are inherited from the caller via `secrets: inherit`.
    # Environment-scoped secrets (AZURE_CREDENTIALS, DATABASE_URL) are resolved
    # automatically by the GitHub environment set on the deploy job.

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Test & Lint  (ubuntu-latest: fast, free GitHub-hosted runner)
  # Deployment is blocked until these checks pass.
  # ---------------------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Type check (SPAs + packages)
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npm run lint

      - name: Unit tests (SPAs + packages)
        run: npm run test --workspaces --if-present

  # ---------------------------------------------------------------------------
  # JOB 2: Security Scan  (ubuntu-latest: Trivy filesystem scan)
  # ---------------------------------------------------------------------------
  security:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

  # ---------------------------------------------------------------------------
  # JOB 3: Build  (ubuntu-latest: the heavy Docker + Encore build runs HERE,
  # never on the self-hosted deploy runner). Produces app.zip as an artifact.
  # ---------------------------------------------------------------------------
  build:
    name: Build Encore zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies (root workspaces)
        run: npm ci

      - name: Build shared packages
        run: npm run build:packages

      - name: Build the selected SPA into apps/api/web/build
        run: |
          set -euo pipefail
          npm run build --workspace=apps/${{ inputs.web-app }}
          # Only apps/web's vite outDir targets apps/api/web/build directly.
          # For any other SPA (e.g. web-internal, which builds to its own
          # dist/), copy the bundle into the served directory.
          if [ "${{ inputs.web-app }}" != "web" ]; then
            rm -rf apps/api/web/build
            mkdir -p apps/api/web/build
            cp -r "apps/${{ inputs.web-app }}/dist/." apps/api/web/build/
          fi

      - name: Install Encore CLI
        uses: ./.github/actions/encore-install

      - name: Install API dependencies (standalone, not a workspace)
        working-directory: ./apps/api
        run: npm ci

      - name: Scrape the Encore artifact (cancel-then-scrape)
        working-directory: ./apps/api
        # OPTIONAL build path (apps/api/scripts/docker-build.sh model): start
        # `encore build docker`, grab main.mjs as soon as it is written, then
        # cancel before the slow image-layer step. Copy the cached linux/amd64
        # native runtime. Version-sensitive (paths may move between CLI
        # versions); the robust unit is the container image.
        run: |
          set -euo pipefail
          ENCORE=/home/runner/.encore/bin/encore
          MAIN_MJS=".encore/build/combined/combined/main.mjs"
          SCRATCH="encore-scratch:_"

          echo "==> compile main.mjs (cancel before the gzip layer step)"
          docker image rm "$SCRATCH" >/dev/null 2>&1 || true
          "$ENCORE" build docker --config ./infra.config.json "$SCRATCH" &
          ENCORE_PID=$!
          for _ in $(seq 1 600); do
            [ -f "$MAIN_MJS" ] && break
            kill -0 "$ENCORE_PID" 2>/dev/null || { echo "encore exited before main.mjs appeared"; exit 1; }
            sleep 1
          done
          kill "$ENCORE_PID" 2>/dev/null || true
          wait "$ENCORE_PID" 2>/dev/null || true
          test -f "$MAIN_MJS" || { echo "main.mjs not found at $MAIN_MJS"; exit 1; }
          cp "$MAIN_MJS" ./main.mjs
          echo "    main.mjs ready"

          echo "==> locate the native runtime for linux/amd64"
          ENCORE_VERSION="$("$ENCORE" version 2>&1 | awk '/^encore version/ {print $3}')"
          RUNTIME_SRC="$HOME/.cache/encore/bin/${ENCORE_VERSION}/linux/amd64/encore-runtime.node"
          if [ ! -f "$RUNTIME_SRC" ]; then
            echo "    runtime cache miss; populating linux/amd64"
            "$ENCORE" build docker --os linux --arch amd64 "encore-scratch-rt:_" || true
          fi
          test -f "$RUNTIME_SRC" || { echo "encore-runtime.node missing for ${ENCORE_VERSION} linux/amd64"; exit 1; }
          cp "$RUNTIME_SRC" ./encore-runtime.node
          echo "    copied encore-runtime.node (${ENCORE_VERSION})"

      - name: Prune to production dependencies
        working-directory: ./apps/api
        run: npm prune --omit=dev

      - name: Assemble app.zip
        working-directory: ./apps/api
        # Bundle layout mirrors Dockerfile.hotfix: app root holds main.mjs +
        # encore-runtime.node + web/build + node_modules. scripts/migrate.mjs
        # and db/migrations ride along so the deploy job can migrate the target
        # DB from the bundle without a checkout or npm install.
        run: |
          set -euo pipefail
          zip -r -q ../../app.zip \
            main.mjs \
            encore-runtime.node \
            web/build \
            node_modules \
            package.json \
            scripts/migrate.mjs \
            db/migrations
          echo "app.zip size: $(du -sh ../../app.zip | cut -f1)"

      - name: Upload app.zip artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-zip
          path: app.zip
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # JOB 4: Deploy  (self-hosted runner: needs Azure network + identity).
  # Does ONLY login + migrate + deploy; the artifact is built upstream.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: [test, security, build]
    if: ${{ always() && needs.test.result == 'success' && needs.build.result == 'success' }}
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Download app.zip artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: app-zip

      - name: Login to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run database migrations
        continue-on-error: true
        # Encore Cloud auto-applies migrations; an App Service zip deploy does
        # not, so run the standalone runner against the target DB. It uses the
        # bundled node_modules (pg) and db/migrations, so no checkout/install is
        # needed on the deploy runner. Best-effort (continue-on-error) to match
        # the prior posture; teams that require gated migrations can flip this.
        run: |
          set -euo pipefail
          rm -rf _stage && mkdir _stage
          unzip -q app.zip -d _stage
          cd _stage
          node scripts/migrate.mjs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_WEBAPP_RG }} \
            --settings \
              ENCORE_RUNTIME_LIB=/home/site/wwwroot/encore-runtime.node \
              WEB_APP=${{ inputs.web-app }} \
              SERVE_CLIENT=true \
              NODE_ENV=production \
            --output none

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ vars.AZURE_WEBAPP_RG }}
          package: './app.zip'
          startup-command: 'node main.mjs'

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**App:** ${{ vars.AZURE_WEBAPP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**SPA bundled:** ${{ inputs.web-app }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** Encore-as-zip (node main.mjs)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
