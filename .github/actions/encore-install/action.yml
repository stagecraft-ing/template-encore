name: Install Encore CLI
description: >
  Download, install, and configure the Encore CLI on a GitHub Actions runner.
  Disables telemetry. Exposes the CLI at /home/runner/.encore/bin/encore on
  Linux runners — composite actions cannot mutate $PATH for the calling job,
  so the absolute path is the contract.

inputs:
  version:
    description: >
      Encore CLI version pin. Default is "latest". Pin to a specific version
      for reproducible builds.
    required: false
    default: latest

outputs:
  cli-path:
    description: Absolute path to the installed encore binary.
    value: /home/runner/.encore/bin/encore

runs:
  using: composite
  steps:
    - name: Download Encore install script
      shell: bash
      run: curl -fsSL https://encore.dev/install.sh -o install-encore.sh

    - name: Install Encore CLI
      shell: bash
      run: ENCORE_INSTALL_VERSION="${{ inputs.version }}" bash install-encore.sh

    - name: Disable Encore telemetry
      shell: bash
      run: /home/runner/.encore/bin/encore telemetry disable

    - name: Verify install
      shell: bash
      run: /home/runner/.encore/bin/encore version
